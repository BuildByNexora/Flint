name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish, for example v0.2.1"
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout selected tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install -U pip maturin twine

      - name: Build wheel
        run: maturin build --release

      - name: Check wheel
        run: twine check target/wheels/*

      - name: Publish to PyPI
        run: maturin publish --skip-existing
